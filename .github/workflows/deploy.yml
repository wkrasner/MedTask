name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "22"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm test --if-present
 
  deploy-infra:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK deploy
        working-directory: infrastructure
        run: |
          npm install
          npx cdk deploy --require-approval never \
            --context fromEmail=${{ secrets.FROM_EMAIL }} \
            --context environment=prod
      - name: Save CDK outputs
        working-directory: infrastructure
        run: npx cdk output --json > ../cdk-outputs.json
      - uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: cdk-outputs.json

  deploy-frontend:
    needs: deploy-infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cdk-outputs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build React app
        working-directory: frontend
        run: |
          npm install
          export VITE_API_URL=$(cat ../cdk-outputs.json | jq -r '.MedicalOfficeStack.ApiUrl')
          export VITE_USER_POOL_ID=$(cat ../cdk-outputs.json | jq -r '.MedicalOfficeStack.UserPoolId')
          export VITE_USER_POOL_CLIENT_ID=$(cat ../cdk-outputs.json | jq -r '.MedicalOfficeStack.UserPoolClientId')
          npm run build
      - name: Upload to S3 + invalidate CloudFront
        working-directory: frontend
        run: |
          S3=$(cat ../cdk-outputs.json | jq -r '.MedicalOfficeStack.SiteBucketName')
          CF=$(cat ../cdk-outputs.json | jq -r '.MedicalOfficeStack.DistributionId')
          aws s3 sync dist/ s3://$S3 --delete
          aws cloudfront create-invalidation --distribution-id $CF --paths "/*"
