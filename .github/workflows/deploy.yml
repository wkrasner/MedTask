name: Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  AWS_REGION: us-east-1
  NODE_VERSION: "22"
  S3_BUCKET: medicalofficestack-sitebucket397a1860-axlnzizli2yd
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm test --if-present
  deploy-infra:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK deploy
        working-directory: infrastructure
        run: |
          npm install
          npx cdk deploy --require-approval never \
            --context fromEmail=${{ secrets.FROM_EMAIL }} \
            --context environment=prod
  deploy-frontend:
    needs: deploy-infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build React app
        working-directory: frontend
        run: |
          npm install
          export VITE_API_URL=https://op3fubg07j.execute-api.us-east-1.amazonaws.com
          export VITE_USER_POOL_ID=us-east-1_rUUpPPAqG
          export VITE_USER_POOL_CLIENT_ID=3cja6d55tltoap89q3tr5unqgb
          npm run build
      - name: Upload to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }} --delete
      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[0].Id" --output text)
          echo "Distribution ID: $DIST_ID"
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
